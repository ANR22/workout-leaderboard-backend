version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: leaderboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: leaderboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leaderboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: leaderboard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
    driver: local
