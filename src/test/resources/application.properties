spring.application.name=leaderboard-test

# Keep tests self-contained with in-memory H2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Redis defaults retained for tests that may bootstrap context
spring.data.redis.host=localhost
spring.data.redis.port=6379

app.jwt.secret=MyVerySecureSecretKeyFor256BitHS256AlgorithmPleaseChangeInProduction
app.jwt.expiration=300000
